<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ackchyually</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Impact&display=swap');
    </style>
</head>
<body class="bg-black text-lime-400 font-mono">

    <nav class="bg-zinc-950 border-b border-lime-500/30 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-lime-500 text-black rounded-full flex items-center justify-center text-2xl">🤓</div>
                <span class="font-bold text-3xl tracking-tighter">ACKCHYUALLY</span>
            </div>
            <div class="flex gap-x-8 text-sm">
                <a href="#gallery" class="hover:text-lime-400">Gallery</a>
                <a href="#generator" class="hover:text-lime-400">Generator</a>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-6 pt-16 pb-10 text-center">
        <h1 class="text-5xl md:text-6xl font-bold text-white leading-tight">
            Have you seen the meme of the nerdy looking dude saying “Akshually…”?
        </h1>
    </div>

    <!-- Gallery -->
    <div id="gallery" class="max-w-7xl mx-auto px-6 py-12 bg-zinc-950">
        <h2 class="text-4xl font-bold text-center mb-10 text-white">Gallery</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <img src="Ack1.png" class="rounded-3xl" alt="">
            <img src="Ack2.jpeg" class="rounded-3xl" alt="">
            <img src="Ack3.jpeg" class="rounded-3xl" alt="">
            <img src="Ack4.jpeg" class="rounded-3xl" alt="">
        </div>
    </div>

    <!-- Generator -->
    <div id="generator" class="max-w-5xl mx-auto px-6 py-16">
        <h2 class="text-4xl font-bold text-center mb-10 text-white">Ackchyually Meme Generator</h2>
        
        <div class="grid md:grid-cols-5 gap-8">
            <div class="md:col-span-2 space-y-6">
                <div>
                    <p class="text-lime-300 mb-3">Choose Template</p>
                    <div class="grid grid-cols-2 gap-4" id="templates"></div>
                </div>

                <div>
                    <label class="block text-lime-300 mb-2">Top Text</label>
                    <input id="top-text" type="text" value="WELL ACKCHYUALLY" 
                           class="w-full bg-zinc-900 border border-lime-600 rounded-2xl px-5 py-4 text-white" 
                           oninput="drawMeme()">
                </div>
                <div>
                    <label class="block text-lime-300 mb-2">Bottom Text</label>
                    <input id="bottom-text" type="text" value="IT'S ACTUALLY..." 
                           class="w-full bg-zinc-900 border border-lime-600 rounded-2xl px-5 py-4 text-white" 
                           oninput="drawMeme()">
                </div>

                <button onclick="downloadMeme()" 
                        class="w-full py-5 bg-lime-500 hover:bg-lime-400 text-black font-bold rounded-3xl">
                    DOWNLOAD MEME
                </button>
            </div>

            <div class="md:col-span-3">
                <canvas id="meme-canvas" width="600" height="600" class="w-full rounded-3xl border border-lime-600 bg-black"></canvas>
            </div>
        </div>
    </div>

    <footer class="text-center py-8 text-lime-500/60 text-sm">
        Ackchyually... made with Grok
    </footer>

    <script>
        const templates = [
            { url: "Ack1.png" },
            { url: "Ack2.jpeg" },
            { url: "Ack3.jpeg" },
            { url: "Ack4.jpeg" }
        ];

        let currentImage = new Image();

        function renderTemplates() {
            const container = document.getElementById('templates');
            container.innerHTML = '';
            templates.forEach((t, index) => {
                const div = document.createElement('div');
                div.className = "cursor-pointer border border-lime-600 hover:border-lime-400 rounded-2xl overflow-hidden";
                div.innerHTML = `<img src="${t.url}" class="w-full h-32 object-cover">`;
                div.onclick = () => {
                    currentImage.src = t.url;
                };
                container.appendChild(div);
            });
        }

        function drawMeme() {
            const canvas = document.getElementById('meme-canvas');
            const ctx = canvas.getContext('2d');
            
            // Draw image
            if (currentImage.complete && currentImage.src) {
                ctx.drawImage(currentImage, 0, 0, 600, 600);
            } else if (templates[0]) {
                currentImage.src = templates[0].url;
                currentImage.onload = () => drawMeme();
                return;
            }

            // Draw text
            const top = document.getElementById('top-text').value.toUpperCase();
            const bottom = document.getElementById('bottom-text').value.toUpperCase();

            ctx.textAlign = 'center';
            ctx.strokeStyle = '#000000';
            ctx.fillStyle = '#ffffff';
            ctx.lineWidth = 8;
            ctx.lineJoin = 'round';
            ctx.font = 'bold 48px Impact';

            // Top text
            ctx.strokeText(top, 300, 90);
            ctx.fillText(top, 300, 90);

            // Bottom text
            ctx.strokeText(bottom, 300, 520);
            ctx.fillText(bottom, 300, 520);
        }

        function downloadMeme() {
            const canvas = document.getElementById('meme-canvas');
            const link = document.createElement('a');
            link.download = 'ackchyually-meme.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // Auto update every 100ms when typing
        setInterval(drawMeme, 100);

        window.onload = () => {
            renderTemplates();
            // Load first image
            currentImage.src = templates[0].url;
            currentImage.onload = drawMeme;
        };
    </script>
</body>
</html>

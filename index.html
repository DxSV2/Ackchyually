<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ackchyually</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Impact&amp;display=swap');
        .meme-text {
            font-family: Impact, Arial Black, sans-serif;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            color: white;
            font-weight: 900;
            letter-spacing: 2px;
        }
    </style>
</head>
<body class="bg-black text-lime-400 font-mono">
    <nav class="bg-zinc-950 border-b border-lime-500/30 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-lime-500 text-black rounded-full flex items-center justify-center font-bold text-2xl">🤓</div>
                <span class="font-bold text-3xl tracking-tighter text-white">ACKCHYUALLY</span>
            </div>
            <div class="flex items-center gap-x-8 text-sm text-white">
                <a href="#gallery" class="hover:text-lime-400 transition-colors">Gallery</a>
                <a href="#generator" class="hover:text-lime-400 transition-colors">Generator</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <div class="max-w-4xl mx-auto px-6 pt-20 pb-12 text-center">
        <div class="inline-flex items-center gap-x-2 bg-zinc-900 px-5 py-2 rounded-3xl mb-8 border border-lime-500/30">
            <span class="text-lime-400">🤓</span>
            <span class="text-sm">Well ackchyually...</span>
        </div>
        <h1 class="text-6xl md:text-7xl font-bold tracking-tighter mb-6 text-white">
            Have you seen the meme of the nerdy looking dude saying “Akshually…”?
        </h1>
        <p class="text-xl text-lime-300 max-w-lg mx-auto">
            Create, correct, and spread your own Ackchyually memes
        </p>
        <a href="#generator" class="mt-10 inline-block px-8 py-4 bg-lime-500 hover:bg-lime-400 text-black font-bold rounded-3xl flex items-center gap-x-3 transition-all">
            <i class="fa-solid fa-magic"></i> CREATE MEME NOW
        </a>
    </div>

    <!-- Gallery -->
    <div id="gallery" class="max-w-7xl mx-auto px-6 py-16 bg-zinc-950">
        <h2 class="text-4xl font-bold text-center text-white mb-10">Ackchyually Gallery</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <img src="images/ack1.png" class="rounded-3xl border border-lime-500/30" alt="Ackchyually">
            <img src="images/ack2.jpeg" class="rounded-3xl border border-lime-500/30" alt="Ackchyually">
            <img src="images/ack3.jpeg" class="rounded-3xl border border-lime-500/30" alt="Ackchyually">
            <img src="images/ack4.jpeg" class="rounded-3xl border border-lime-500/30" alt="Ackchyually">
        </div>
    </div>

    <!-- Generator -->
    <div id="generator" class="max-w-5xl mx-auto px-6 py-16">
        <h2 class="text-4xl font-bold text-center mb-10 text-white">Ackchyually Meme Generator</h2>
        
        <div class="grid md:grid-cols-5 gap-8">
            <div class="md:col-span-2">
                <h3 class="text-lime-300 mb-4">Choose Template</h3>
                <div class="grid grid-cols-2 gap-3" id="templates"></div>
                
                <div class="mt-6">
                    <label class="block text-lime-300 mb-2">Top Text</label>
                    <input id="top-text" type="text" value="WELL ACKCHYUALLY" 
                           class="w-full bg-black border border-lime-500/50 focus:border-lime-400 rounded-2xl px-5 py-4 text-white outline-none"
                           oninput="drawMeme()">
                </div>
                <div class="mt-4">
                    <label class="block text-lime-300 mb-2">Bottom Text</label>
                    <input id="bottom-text" type="text" value="IT'S ACTUALLY..." 
                           class="w-full bg-black border border-lime-500/50 focus:border-lime-400 rounded-2xl px-5 py-4 text-white outline-none"
                           oninput="drawMeme()">
                </div>
                
                <button onclick="downloadMeme()" 
                        class="mt-6 w-full py-5 bg-lime-500 hover:bg-lime-400 text-black font-bold text-lg rounded-3xl">
                    DOWNLOAD MEME
                </button>
            </div>

            <div class="md:col-span-3">
                <canvas id="meme-canvas" width="600" height="600" class="w-full rounded-3xl border-2 border-lime-500/30 shadow-2xl"></canvas>
            </div>
        </div>
    </div>

    <footer class="text-center py-8 text-lime-500/50 text-sm">
        Ackchyually... made with Grok
    </footer>

    <script>
        const templates = [
            { name: "Classic Nerd", url: "images/ack1.png" },
            { name: "Backpack Nerd", url: "images/ack2.jpeg" },
            { name: "Military Nerd 1", url: "images/ack3.jpeg" },
            { name: "Military Nerd 2", url: "images/ack4.jpeg" }
        ];

        let currentImage = new Image();

        function renderTemplates() {
            const container = document.getElementById('templates');
            container.innerHTML = '';
            templates.forEach((t) => {
                const div = document.createElement('div');
                div.className = "cursor-pointer border border-lime-500/30 hover:border-lime-400 rounded-2xl overflow-hidden";
                div.innerHTML = `<img src="${t.url}" class="w-full h-32 object-cover">`;
                div.onclick = () => {
                    currentImage.src = t.url;
                    currentImage.onload = drawMeme;
                };
                container.appendChild(div);
            });
        }

        function drawMeme() {
            const canvas = document.getElementById('meme-canvas');
            const ctx = canvas.getContext('2d');
            
            if (!currentImage.src) currentImage.src = templates[0].url;
            
            currentImage.onload = () => {
                ctx.drawImage(currentImage, 0, 0, 600, 600);
                
                const top = document.getElementById('top-text').value.toUpperCase();
                const bottom = document.getElementById('bottom-text').value.toUpperCase();
                
                ctx.textAlign = 'center';
                ctx.strokeStyle = '#000';
                ctx.fillStyle = '#fff';
                ctx.lineWidth = 8;
                ctx.font = 'bold 48px Impact';
                
                ctx.strokeText(top, 300, 90);
                ctx.fillText(top, 300, 90);
                ctx.strokeText(bottom, 300, 520);
                ctx.fillText(bottom, 300, 520);
            };
        }

        function downloadMeme() {
            const canvas = document.getElementById('meme-canvas');
            const link = document.createElement('a');
            link.download = 'ackchyually-meme.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        window.onload = () => {
            renderTemplates();
            drawMeme();
        };
    </script>
</body>
</html>
